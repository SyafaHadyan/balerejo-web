name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  ci:
    name: Type check, Lint, Build, and Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Type check — main
        run: npx tsc --noEmit -p apps/main/tsconfig.json

      - name: Type check — umkm
        run: npx tsc --noEmit -p apps/umkm/tsconfig.json

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Audit
        run: npm audit --audit-level=high
